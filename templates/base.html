<!DOCTYPE html>
<html lang="vi" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{% block title %}ClassPro{% endblock %}</title>
  <meta name="description" content="{% block description %}ClassPro — class report sharing portal{% endblock %}" />

  <!-- Open Graph -->
  <meta property="og:title"       content="{% block og_title %}ClassPro{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}View your class report on ClassPro{% endblock %}" />
  <meta property="og:type"        content="website" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') if url_for is defined else '/static/favicon.svg' }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') if url_for is defined else '/static/css/style.css' }}" />

  {% block head_extra %}{% endblock %}
</head>

<body>
  <!-- ── Site Header ────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="container">
      <div class="header-inner">

        <!-- Logo -->
        <a href="/" class="logo" aria-label="ClassPro home">
          <div class="logo-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <span class="logo-text">ClassPro</span>
        </a>

        <!-- Right actions -->
        <div class="header-actions">
          <!-- Language toggle -->
          <button
            id="langToggle"
            class="icon-btn"
            onclick="toggleLang()"
            aria-label="Switch language"
            title="Switch language"
          >VI</button>

          <!-- Dark / light toggle -->
          <button
            id="themeToggle"
            class="icon-btn"
            onclick="toggleTheme()"
            aria-label="Toggle dark mode"
          >
            <!-- Populated by JS -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span data-i18n="toggleDark">Dark</span>
          </button>
        </div>

      </div>
    </div>
  </header>

  <!-- ── Main Content ──────────────────────────────── -->
  <main role="main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Site Footer ───────────────────────────────── -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <span data-i18n="madeFor">Made with ❤️ for teachers</span>
      &nbsp;·&nbsp;
      ClassPro &copy; <span id="footerYear"></span>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="{{ url_for('static', path='js/app.js') if url_for is defined else '/static/js/app.js' }}"></script>
  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
