<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{% block title %}ClassPro{% endblock %}</title>
  <meta name="description" content="{% block description %}ClassPro — class report sharing portal{% endblock %}" />

  <!-- Open Graph -->
  <meta property="og:title"       content="{% block og_title %}ClassPro{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}View your class report on ClassPro{% endblock %}" />
  <meta property="og:type"        content="website" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') if url_for is defined else '/static/favicon.svg' }}" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5.3.3 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <!-- Bootstrap Icons 1.11 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Custom overrides -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') if url_for is defined else '/static/css/style.css' }}?v=3" />

  {% block head_extra %}{% endblock %}
</head>

<body>
  <!-- ── Sticky Navbar ──────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg sticky-top border-bottom" id="mainNavbar">
    <div class="container">

      <!-- Brand / Logo -->
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/" aria-label="ClassPro home">
        <div class="brand-icon d-flex align-items-center justify-content-center rounded-2 bg-primary text-white"
             style="width:30px;height:30px;flex-shrink:0;">
          <i class="bi bi-book-fill" style="font-size:.875rem;"></i>
        </div>
        <span class="brand-name">ClassPro</span>
      </a>

      <!-- Toggler for mobile (no nav links, just actions — skip toggler) -->

      <!-- Right actions -->
      <div class="d-flex align-items-center gap-2 ms-auto">

        <!-- Language toggle -->
        <button
          id="langToggle"
          class="btn btn-sm btn-outline-secondary rounded-pill px-3 fw-semibold"
          aria-label="Switch language"
          style="font-size:.8125rem;min-width:42px;"
        >VI</button>

        <!-- Dark / light toggle -->
        <button
          id="themeToggle"
          class="btn btn-sm btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center"
          aria-label="Toggle dark mode"
          style="width:34px;height:34px;padding:0;"
        >
          <i class="bi bi-moon-fill"></i>
        </button>

      </div>
    </div>
  </nav>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main class="py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="bg-body-secondary border-top py-3 text-center text-muted small">
    <div class="container">
      <span data-i18n="madeFor">Made with ❤️ for teachers</span>
      &nbsp;·&nbsp;
      ClassPro &copy; <span id="footerYear"></span>
    </div>
  </footer>

  <!-- Bootstrap 5.3.3 JS Bundle (Popper included) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmrmWBhLYYj9R6KoDDqDHTlb0bik" crossorigin="anonymous"></script>

  <!-- Chart.js 4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', path='js/app.js') if url_for is defined else '/static/js/app.js' }}?v=3"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
